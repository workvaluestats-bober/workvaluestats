<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKVALUE | Beaver Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #bc13fe;
            --neon-dim: rgba(188, 19, 254, 0.2);
            --bg: #000000; /* Solid Black */
            --card-bg: #0a0a0f; 
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --font-main: 'Inter', sans-serif;
            --font-head: 'Exo 2', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text-light);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 280px;
            background: #050505;
            border-right: 2px solid var(--neon);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .logo-area {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 1px solid #222;
            margin-bottom: 20px;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            box-shadow: 0 0 15px var(--neon);
            object-fit: cover;
            margin-bottom: 15px;
            mix-blend-mode: screen; 
        }

        .brand-name {
            font-family: var(--font-head);
            font-weight: 700;
            font-size: 1.5rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .nav-menu ul { list-style: none; padding: 0; }
        .nav-menu li {
            padding: 15px;
            cursor: pointer;
            color: var(--text-muted);
            border-left: 2px solid transparent;
            transition: 0.3s;
            font-family: var(--font-head);
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .nav-menu li:hover, .nav-menu li.active {
            background: rgba(188, 19, 254, 0.05);
            color: var(--neon);
            border-left: 2px solid var(--neon);
        }

        /* Main Content */
        #main {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h2 {
            font-family: var(--font-head);
            font-weight: 700;
            color: white;
            margin-top: 0;
        }

        .input-group { margin-bottom: 20px; }
        
        label {
            display: block;
            font-family: var(--font-head);
            font-weight: 600;
            color: var(--neon);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        input:focus { border-color: var(--neon); outline: none; }

        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--neon);
            color: white;
            font-family: var(--font-head);
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 8px;
        }

        button:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 15px var(--neon);
        }

        #result {
            margin-top: 25px;
            text-align: center;
            display: none;
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        .time-val {
            font-size: 3rem;
            font-family: var(--font-head);
            font-weight: 700;
            color: white;
            text-shadow: 0 0 10px var(--neon);
        }

        .share-btn {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #0ff;
            text-decoration: none;
            cursor: pointer;
            font-family: var(--font-main);
        }

        /* Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; border-right: none; border-bottom: 2px solid var(--neon); }
            #main { padding: 20px; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo-area">
        <img src="logo.png" alt="Beaver" class="logo-img">
        <h1 class="brand-name">WORKVALUE</h1>
    </div>
    <div class="nav-menu">
        <ul>
            <li class="active">🍕 Time Cost</li>
            <li>📊 Global Data</li>
        </ul>
    </div>
</div>

<div id="main">
    <div class="container">
        <h2>Time Cost Calculator</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem;">Convert expenses into hours of your life.</p>
        
        <div class="input-group">
            <label>Price (USD)</label>
            <input type="number" id="price" placeholder="0.00">
        </div>

        <div class="input-group">
            <label>Hourly Rate (Net)</label>
            <input type="number" id="rate" placeholder="0.00">
        </div>

        <button onclick="calc()">Run Scan</button>

        <div id="result">
            <div class="time-val" id="val">0.0h</div>
            <p style="text-transform: uppercase; color: var(--text-muted); margin: 0; font-family: var(--font-head); font-size: 0.9rem;">Hours of life spent</p>
            <div class="share-btn" onclick="copyResult()">[ COPY FOR X ]</div>
        </div>
    </div>
</div>

<script>
    function calc() {
        const p = document.getElementById('price').value;
        const r = document.getElementById('rate').value;
        const resDiv = document.getElementById('result');
        
        if(p > 0 && r > 0) {
            const h = (p / r).toFixed(1);
            document.getElementById('val').innerText = h + "h";
            resDiv.style.display = 'block';
        }
    }

    function copyResult() {
        const val = document.getElementById('val').innerText;
        const text = `WORKVALUE SCAN: This item costs me ${val} of my life. 🦫 Check your #WorkValue at [YourDomain].com`;
        navigator.clipboard.writeText(text);
        alert("Data copied to clipboard!");
    }
</script>

</body>
</html>

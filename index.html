<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKVALUE | Beaver Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #bc13fe;
            --neon-dim: rgba(188, 19, 254, 0.3);
            --bg: #050508;
            --card-bg: rgba(15, 15, 25, 0.8);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg);
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: 
                linear-gradient(var(--neon-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .header {
            margin-top: 50px;
            text-align: center;
        }

        .logo-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--neon);
            box-shadow: 0 0 20px var(--neon), inset 0 0 20px var(--neon);
            margin-bottom: 20px;
            object-fit: cover;
            /* Triki, jeśli logo ma tło: */
            mix-blend-mode: screen; 
            filter: brightness(1.2);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 3px 3px 0 var(--neon), -1px -1px 0 #0ff;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin: 40px 0;
            background: var(--card-bg);
            border: 2px solid var(--neon);
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 10px 10px 0px var(--neon);
            box-sizing: border-box;
        }

        .input-group { margin-bottom: 25px; }

        label {
            display: block;
            color: var(--neon);
            font-size: 0.7rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--neon);
            padding: 15px;
            color: #0ff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 20px;
            background: transparent;
            border: 2px solid var(--neon);
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 30px var(--neon);
        }

        #result-box {
            display: none;
            margin-top: 30px;
            border-top: 1px solid var(--neon-dim);
            padding-top: 20px;
            text-align: center;
        }

        .big-time {
            font-size: 4rem;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            text-shadow: 0 0 15px var(--neon);
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="Beaver Investor" class="logo-img">
        <h1>WORKVALUE</h1>
    </div>

    <div class="container">
        <div class="input-group">
            <label>> ENTER_ASSET_PRICE (USD)</label>
            <input type="number" id="price" placeholder="000.00">
        </div>

        <div class="input-group">
            <label>> ENTER_HOURLY_RATE (NET)</label>
            <input type="number" id="rate" placeholder="00.00">
        </div>

        <button onclick="calculate()">Execute Analysis</button>

        <div id="result-box">
            <div class="big-time" id="val">0.0h</div>
            <p style="color: var(--neon); font-size: 0.8rem;">TOTAL LIFE HOURS CONSUMED</p>
        </div>
    </div>

    <script>
        function calculate() {
            const p = document.getElementById('price').value;
            const r = document.getElementById('rate').value;
            if(p > 0 && r > 0) {
                const hours = (p / r).toFixed(1);
                document.getElementById('val').innerText = hours + "H";
                document.getElementById('result-box').style.display = 'block';
            }
        }
    </script>
</body>
</html>

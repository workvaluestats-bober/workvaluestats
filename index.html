<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkValueStats - Bóbr</title>
    <style>
        /* To naprawia responsywność */
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            background-color: #1a1a1a; /* Ciemne tło, żeby logo pasowało */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* Blokada przesuwania na boki */
        }
        
        /* Styl dla Twojego nowego logo */
        .my-logo {
            max-width: 150px;
            height: auto;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
        }

        /* Tu będzie reszta Twojego starego kodu (kalkulator itp.) */
        /* Jeśli masz swój stary kod CSS, wklej go poniżej */
    </style>
</head>
<body>

    <img src="logo_kolo.png" alt="Logo Bóbr" class="my-logo">

    <h1>WorkValueStats - Cześć Bóbr, Beaver</h1>

    </body>
</html>

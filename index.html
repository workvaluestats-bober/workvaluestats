<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkValue Stats | Beaver Investor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe; /* Odcień z Twojego logo */
            --dark-space: #08080c;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark-space);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #08080c 100%);
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        .logo-box {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: url('logo_bobier.png') center/cover; /* Tu wrzuć plik logo */
            box-shadow: 0 0 30px var(--neon-purple);
            border: 2px solid var(--neon-purple);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.8rem;
            margin: 0;
            text-shadow: 0 0 10px var(--neon-purple);
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 25px; }
        
        label {
            display: block;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--neon-purple);
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-size: 1.2rem;
            font-family: 'Rajdhani', sans-serif;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
        }

        button {
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 2px solid var(--neon-purple);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: inset 0 0 0 0 var(--neon-purple);
        }

        button:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
            color: black;
        }

        #result {
            margin-top: 30px;
            text-align: center;
            display: none;
        }

        .time-val {
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-purple);
        }

        .share-btn {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #aaa;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-box"></div>
    <h1>Work Value</h1>
</header>

<div class="container">
    <div class="input-group">
        <label>Price (USD)</label>
        <input type="number" id="price" placeholder="0.00">
    </div>

    <div class="input-group">
        <label>Your Hourly Rate (Net)</label>
        <input type="number" id="rate" placeholder="0.00">
    </div>

    <button onclick="calc()">Run Scan</button>

    <div id="result">
        <div class="time-val" id="val">0.0</div>
        <p style="text-transform: uppercase; letter-spacing: 2px;">Hours of life spent</p>
        <div class="share-btn" onclick="copyResult()">Copy result for Twitter</div>
    </div>
</div>

<script>
    function calc() {
        const p = document.getElementById('price').value;
        const r = document.getElementById('rate').value;
        const resDiv = document.getElementById('result');
        
        if(p > 0 && r > 0) {
            const h = (p / r).toFixed(1);
            document.getElementById('val').innerText = h + "h";
            resDiv.style.display = 'block';
        }
    }

    function copyResult() {
        const val = document.getElementById('val').innerText;
        const text = `I just found out this item costs me ${val} of my life. 🦫 Check your #WorkValue here!`;
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard! Ready for viral post.");
    }
</script>

</body>
</html>
